<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 600 40'
    style='background-color: #1E242A00;'
    width='600px' height='40px'>

    <style>
@font-face {
  font-family: 'Courier Prime';
  font-style: normal;
  font-weight: 400;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d2.end'
                    dur='3800ms' fill='remove'
                    values='m0,20 h0 ; m0,20 h600 ; m0,20 h600 ; m0,20 h0' keyTimes='0;0.63157894736842;0.84210526315789;1' />
                    </path>
    <text font-family='"Courier Prime", monospace' fill='#BD93F9' font-size='20'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='1px'>
        <textPath xlink:href='#path0'>
            Sou desenvolvedor Backend!
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='3800ms' fill='remove'
                    values='m0,20 h0 ; m0,20 h600 ; m0,20 h600 ; m0,20 h0' keyTimes='0;0.63157894736842;0.84210526315789;1' />
                    </path>
    <text font-family='"Courier Prime", monospace' fill='#BD93F9' font-size='20'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='1px'>
        <textPath xlink:href='#path1'>
            A colaboracao e a melhor forma de evoluir...
        </textPath>
    </text>
        <path id='path2'>
                            <!-- Single line -->
                                <animate id='d2' attributeName='d' begin='d1.end'
                    dur='3800ms' fill='remove'
                    values='m0,20 h0 ; m0,20 h600 ; m0,20 h600 ; m0,20 h0' keyTimes='0;0.63157894736842;0.84210526315789;1' />
                    </path>
    <text font-family='"Courier Prime", monospace' fill='#BD93F9' font-size='20'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='1px'>
        <textPath xlink:href='#path2'>
            Vamos nos conectar?
        </textPath>
    </text>
</svg>
